{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/estilos_login.css' %}">
    <link rel="stylesheet" href="{% static 'css/estilos_demo_automatizaciones.css' %}">
    <link rel="stylesheet" href="{% static 'css/estilos_catalogo.css' %}">
</head>
<body>

<div class="contenedor-caja-login" style="margin-top: 50px;">
    <div class="caja-login">
        <h2 style="text-align: right;">Iniciar sesión</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="fila">
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" placeholder="micorreo@midominio.com" required>
            </div>
            <div class="fila">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" placeholder="Contraseña" required>
            </div>
            <button class="boton boton_demo" type="submit">Entrar</button>
        </form>
        <div class="ayuda">¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a></div>
    </div>
</div>

</body>
</html>
